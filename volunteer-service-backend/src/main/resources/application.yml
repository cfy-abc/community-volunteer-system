server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/volunteer_db?useSSL=false&serverTimezone=UTC&characterEncoding=utf8
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver

# MyBatis配置
mybatis:
  configuration:
    map-underscore-to-camel-case: true

# JWT配置
jwt:
  secret: your_jwt_secret_key_here
  expiration: 86400000 # 24小时

# 文件上传配置（相对路径，位于项目运行目录下）
file:
  upload-path: ./uploads/

# 微信小程序/公众号配置
wechat:
  app-id: YOUR_WECHAT_APPID
  app-secret: YOUR_WECHAT_APPSECRET
  oauth2-redirect-uri: http://localhost:5173/pages/auth/login